# Semgrep custom rules for fintech transaction integrity.
# This file is enabled by scan_directives.py for detected_domain='fintech'.

rules:

  # =========================================================================
  # Transaction integrity & atomicity
  # =========================================================================

  - id: fintech-non-atomic-balance-update
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Non-atomic balance update detected. This is a classic race
      condition that allows double-spend. Use atomic SQL UPDATE
      (UPDATE accounts SET balance = balance - $amount WHERE id = $X
      AND balance >= $amount) or a database transaction with
      row-level locks.
    metadata:
      cwe: "CWE-362: Concurrent Execution using Shared Resource"
      owasp: "A04:2021 Insecure Design"
      owasp-api: "API6:2023 Unrestricted Access to Sensitive Business Flows"
    patterns:
      - pattern-either:
          - pattern: |
              balance = balance - $amount
              db.save(account)
          - pattern: |
              account.balance -= $amount
              account.save()
          - pattern: |
              $BAL = $ACCOUNT.balance
              $BAL = $BAL - $AMT
              $ACCOUNT.save()

  - id: fintech-missing-balance-check
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Balance withdrawal without sufficient-funds check. Always verify
      account.balance >= amount BEFORE deducting.
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A04:2021 Insecure Design"
    patterns:
      - pattern-either:
          - pattern: |
              account.balance -= $amount
          - pattern: |
              balance = balance - $amount
      - pattern-not: |
          if account.balance >= $amount: ...
      - pattern-not: |
          if balance >= $amount: ...

  - id: fintech-replay-attack
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Transfer endpoint without idempotency / replay protection.
      Each transfer MUST use a unique idempotency key (e.g. UUID from
      client) and check it against a deduplication cache (Redis,
      database constraint).
    metadata:
      cwe: "CWE-294: Authentication Bypass by Capture-Replay"
      owasp: "A04:2021 Insecure Design"
      owasp-api: "API6:2023 Unrestricted Access to Sensitive Business Flows"
    patterns:
      - pattern-either:
          - pattern: |
              $APP.post("/transfer", $HANDLER)
          - pattern: |
              $APP.post("/api/transfer", $HANDLER)
          - pattern: |
              $APP.post("/api/transactions", $HANDLER)
      - pattern-not: |
          $APP.post("/transfer", idempotency, $HANDLER)

  - id: fintech-missing-audit-trail
    languages: [javascript, typescript, python]
    severity: WARNING
    message: >-
      Financial transaction without audit log. SOC2 CC7.2 and PCI-DSS
      10 require audit logs for all financial operations. Log: actor,
      timestamp, amount, before/after balance.
    metadata:
      cwe: "CWE-778: Insufficient Logging"
      owasp: "A09:2021 Security Logging and Monitoring Failures"
    patterns:
      - pattern-either:
          - pattern: |
              $APP.post("/transfer", $H)
          - pattern: |
              $APP.post("/withdraw", $H)
          - pattern: |
              $APP.post("/deposit", $H)

  - id: fintech-ledger-imbalance
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Two-sided ledger mutation without check. Every transfer must
      have a corresponding ledger entry on both sides (debit + credit).
      Use double-entry bookkeeping.
    metadata:
      cwe: "CWE-682: Incorrect Calculation"
      owasp: "A04:2021 Insecure Design"
    patterns:
      - pattern-either:
          - pattern: |
              $FROM.balance -= $AMT
              ...
      - pattern: |
          $TO.balance += $AMT
          ...

  - id: fintech-kyc-bypass
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      High-value transaction without KYC verification. For
      transactions > $10K, require KYC (Know Your Customer) check.
      Pattern: query kyc_status table before allowing transfer.
    metadata:
      cwe: "CWE-285: Improper Authorization"
      owasp: "A04:2021 Insecure Design"
    patterns:
      - pattern-either:
          - pattern: |
              if ($AMOUNT > 10000) { transfer() }

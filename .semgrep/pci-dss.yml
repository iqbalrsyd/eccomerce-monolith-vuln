# Semgrep custom rules for PCI-DSS v4.0 compliance (e-commerce).
# This file is enabled by scan_directives.py for detected_domain='e-commerce'.
# Loaded alongside ecommerce.yml + owasp-api.yml.

rules:

  # =========================================================================
  # Requirement 3: Protect stored cardholder data
  # =========================================================================

  - id: pci-dss-3-4-pan-in-source
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Possible Primary Account Number (PAN) in source code. PCI-DSS v4.0
      Req 3.4 prohibits storing cleartext PAN. Move to a tokenization
      service (e.g. Stripe tokens, Braintree vault) or redact
      (display only last 4 digits: card.number.slice(-4)).
    metadata:
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      pci-dss: "3.4 Render PAN unreadable anywhere it is stored"
      owasp: "A02:2021 Cryptographic Failures"
    pattern-regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'

  - id: pci-dss-3-4-cvv-in-source
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Possible CVV/CVC code in source. PCI-DSS v4.0 Req 3.3 prohibits
      storing CVV after authorization. This MUST be transmitted
      directly to the payment processor and never persisted.
    metadata:
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      pci-dss: "3.3 Protect stored cardholder data"
    patterns:
      - pattern-either:
          - pattern: |
              $CVV = $REQ.body.cvv
          - pattern: |
              $CVV = $REQ.body.cvc
          - pattern: |
              $X.cvv = $VAL
          - pattern: |
              $X.cvc = $VAL
          - pattern: |
              db.save(..., $CVV, ...)

  - id: pci-dss-3-4-magnetic-stripe-data
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Possible magnetic stripe data or track data. PCI-DSS forbids
      storing CVV2, PIN, or full magnetic stripe data after
      authorization. Reject the entire request and inform the
      customer.
    metadata:
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      pci-dss: "3.2 Protect stored cardholder data"
    pattern-regex: '\b(?:track1|track2|magnetic[-_ ]?stripe)\b'

  # =========================================================================
  # Requirement 4: Protect cardholder data with strong cryptography during transmission
  # =========================================================================

  - id: pci-dss-4-payment-over-http
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Payment endpoint over HTTP (not HTTPS). PCI-DSS v4.0 Req 4.2
      requires strong cryptography (TLS 1.2+) for transmitting
      cardholder data over open networks. Use https:// for all
      payment-related URLs.
    metadata:
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      pci-dss: "4.2 Use strong cryptography for cardholder data transmission"
    patterns:
      - pattern-either:
          - pattern: |
              $URL = "http://.../*payment*"
          - pattern: |
              $URL = "http://.../*checkout*"
          - pattern: |
              $URL = "http://.../*card*"
          - pattern: |
              fetch("http://.../*payment*", ...)

  # =========================================================================
  # Requirement 6: Develop and maintain secure systems and software
  # =========================================================================

  - id: pci-dss-6-5-1-injection-flaws
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      SQL injection in payment context. PCI-DSS v4.0 Req 6.5.1
      mandates protection against injection flaws. Use parameterized
      queries.
    metadata:
      cwe: "CWE-89: SQL Injection"
      pci-dss: "6.5.1 Address common coding vulnerabilities in software"
      owasp: "A03:2021 Injection"
    patterns:
      - pattern-either:
          - pattern: |
              db.query("SELECT * FROM payments WHERE id = '" + $ID + "'")
          - pattern: |
              db.query("SELECT * FROM orders WHERE card_id = '" + $CARD + "'")
          - pattern: |
              db.query(`SELECT * FROM payments WHERE amount = ${$X}`)

  - id: pci-dss-6-5-7-xss
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      XSS in payment context (cardholder data exposure). PCI-DSS v4.0
      Req 6.5.7 requires protection against XSS for any page that
      handles cardholder data. Sanitize all user input with textContent
      or a proven sanitizer (DOMPurify).
    metadata:
      cwe: "CWE-79: Cross-site Scripting"
      pci-dss: "6.5.7 Address common coding vulnerabilities"
      owasp: "A03:2021 Injection"
    patterns:
      - pattern-either:
          - pattern: |
              $EL.innerHTML = $REQ.body.billingAddress
          - pattern: |
              res.send("<div>" + $REQ.body.cardholderName + "</div>")

  # =========================================================================
  # Requirement 8: Identify users and authenticate access
  # =========================================================================

  - id: pci-dss-8-3-1-strong-auth-payment
    languages: [javascript, typescript, python]
    severity: ERROR
    message: >-
      Payment endpoint without strong authentication. PCI-DSS v4.0
      Req 8.3.1 requires strong authentication factors (MFA, OTP,
      biometrics) for access to cardholder data. Apply authRequired
      or requireAuth middleware to /payment, /checkout, /api/orders.
    metadata:
      cwe: "CWE-306: Missing Authentication for Critical Function"
      pci-dss: "8.3.1 Strong authentication for cardholder data access"
      owasp-api: "API5:2023 Broken Function Level Authorization"
    patterns:
      - pattern-either:
          - pattern: |
              $APP.post("/payment", $HANDLER)
          - pattern: |
              $APP.post("/checkout", $HANDLER)
          - pattern: |
              $APP.post("/api/charge", $HANDLER)
      - pattern-not: |
          $APP.post("/payment", authRequired, $HANDLER)
      - pattern-not: |
          $APP.post("/payment", requireAuth, $HANDLER)
      - pattern-not: |
          $APP.post("/payment", isAuthenticated, $HANDLER)
      - pattern-not: |
          $APP.post("/payment", authMiddleware, $HANDLER)

  # =========================================================================
  # Requirement 10: Log and monitor all access to cardholder data
  # =========================================================================

  - id: pci-dss-10-2-audit-log-cardholder-access
    languages: [javascript, typescript, python]
    severity: WARNING
    message: >-
      Access to cardholder data without audit log. PCI-DSS v4.0 Req
      10.2 requires audit logs for all access to cardholder data.
      Log: user ID, type of event, time, success/failure, origin.
    metadata:
      cwe: "CWE-778: Insufficient Logging"
      pci-dss: "10.2 Audit logs for cardholder data access"
    patterns:
      - pattern-either:
          - pattern: |
              $APP.get("/payment/:id", $HANDLER)
          - pattern: |
              $APP.get("/api/cards/:id", $HANDLER)
      - pattern-not: |
          $APP.get("/payment/:id", auditLog, $HANDLER)
      - pattern-not: |
          $APP.get("/payment/:id", $HANDLER, $LOGGER)

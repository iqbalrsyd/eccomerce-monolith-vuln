name: "AI DevSecOps \u2014 Domain Compliance (e-commerce)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: e-commerce
permissions:
  contents: read
  security-events: write
jobs:
  jwt-auth-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-jwt-alg-confusion
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: detect-jwt-misconfig-in-src
      run: "#!/usr/bin/env bash\nset -euo pipefail\nfail=0\n\n# Pattern 1: jwt.sign()\
        \ without expiresIn claim\nif grep -rnE 'jwt\\.sign\\s*\\(' src/ 2>/dev/null\
        \ >/dev/null; then\n  if ! grep -rnE 'jwt\\.sign[^)]*expiresIn' src/ 2>/dev/null\
        \ | grep -q .; then\n    echo \"::error file=src/auth.js::jwt.sign() missing\
        \ 'expiresIn' claim - tokens never expire\"\n    fail=1\n  fi\nfi\n\n# Pattern\
        \ 2: jwt.verify() with hardcoded secret literal (>=16 chars)\nif grep -rnE\
        \ \"jwt\\.verify\\([^,]+,\\s*['\\\"][a-zA-Z0-9_\\-]{16,}['\\\"]\" src/ 2>/dev/null\
        \ | grep -q .; then\n  echo \"::error file=src/server.js::Hardcoded JWT secret\
        \ literal passed to jwt.verify()\"\n  fail=1\nfi\n\n# Pattern 3: /checkout\
        \ or /orders routes missing verifyToken middleware\nfor route in checkout\
        \ orders; do\n  if grep -rnE \"router\\.(post|put|patch|delete)\\s*\\(\\s*['\\\
        \"]\\/?$route\" src/ 2>/dev/null | grep -vqE 'verifyToken|authenticate|requireAuth|protect';\
        \ then\n    echo \"::error file=src/routes/$route.js::$route route registered\
        \ without authentication middleware\"\n    fail=1\n  fi\ndone\n\n# Pattern\
        \ 4: process.env.JWT_SECRET used without boot-time guard\nif grep -rnE 'process\\\
        .env\\.JWT_SECRET' src/ 2>/dev/null | grep -q .; then\n  if ! grep -rnE 'if\\\
        s*\\(\\s*!process\\.env\\.JWT_SECRET\\s*\\)' src/ 2>/dev/null | grep -q .;\
        \ then\n    echo \"::warning file=src/server.js::JWT_SECRET read from env\
        \ without boot-time guard; server may start with undefined secret\"\n    fail=1\n\
        \  fi\nfi\n\nexit $fail\n"
    - name: Ensure jwt-auth-hardening-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s jwt-auth-hardening-results.sarif ]; then\n  echo \"::notice::jwt-auth-hardening\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"jwt-auth-hardening\",' \\\n    '     \
        \     \"version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"\
        https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '   \
        \   },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\n\
        \    '}' > jwt-auth-hardening-results.sarif\nfi\necho \"\u2713 jwt-auth-hardening-results.sarif\
        \ size: $(stat -c%s jwt-auth-hardening-results.sarif) bytes\"\n"
    - name: Upload jwt-auth-hardening SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: jwt-auth-hardening-results.sarif
        category: jwt-auth-hardening
  express-api-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    needs:
    - sast
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-express-security-middleware
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: audit-express-security-stack
      run: "#!/usr/bin/env bash\nset -euo pipefail\nfail=0\n\n# Pattern 1: helmet\
        \ not declared in package.json\nif [ -f package.json ] && ! grep -q '\"helmet\"\
        ' package.json; then\n  echo \"::error file=package.json::helmet not installed\
        \ - Express API ships without security headers\"\n  fail=1\nfi\n\n# Pattern\
        \ 2: express-rate-limit missing for /checkout and /login abuse protection\n\
        if [ -f package.json ] && ! grep -q '\"express-rate-limit\"' package.json;\
        \ then\n  echo \"::error file=package.json::express-rate-limit missing - /checkout\
        \ and /login can be brute-forced or abused\"\n  fail=1\nfi\n\n# Pattern 3:\
        \ CORS middleware absent in src/server.js\nif [ -f src/server.js ] && ! grep\
        \ -qE 'cors\\s*\\(' src/server.js; then\n  echo \"::warning file=src/server.js::No\
        \ cors() middleware configured - API may be open to all origins\"\n  fail=1\n\
        fi\n\n# Pattern 4: express.json() invoked with no size limit (DoS via /checkout)\n\
        if grep -rnE 'express\\.json\\s*\\(\\s*\\)' src/ 2>/dev/null | grep -v 'limit'\
        \ | grep -q .; then\n  echo \"::warning file=src/server.js::express.json()\
        \ called without explicit { limit: ... } - large payload DoS on /checkout\"\
        \n  fail=1\nfi\n\n# Pattern 5: better-sqlite3 .prepare() with template literal\
        \ in src/\nif grep -rnE '\\.prepare\\s*\\(\\s*[`'\\''\"][^)]*\\$\\{' src/\
        \ 2>/dev/null | grep -q .; then\n  echo \"::error file=src/db.js::better-sqlite3\
        \ .prepare() with template literal - SQL injection in catalog/checkout queries\"\
        \n  fail=1\nfi\n\n# Pattern 6: app.listen() bound to 0.0.0.0 without env guard\
        \ (info, not blocker)\nif grep -rnE 'app\\.listen\\s*\\([^)]*0\\.0\\.0\\.0'\
        \ src/ 2>/dev/null | grep -q .; then\n  echo \"::notice file=src/server.js::app.listen\
        \ bound to 0.0.0.0 - confirm intentional (Docker container exposure)\"\nfi\n\
        \nexit $fail\n"
    - name: Ensure express-api-hardening-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s express-api-hardening-results.sarif ]; then\n  echo \"::notice::express-api-hardening\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"express-api-hardening\",' \\\n    '  \
        \        \"version\": \"0.65.0\",' \\\n    '          \"informationUri\":\
        \ \"https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '\
        \      },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\
        \n    '}' > express-api-hardening-results.sarif\nfi\necho \"\u2713 express-api-hardening-results.sarif\
        \ size: $(stat -c%s express-api-hardening-results.sarif) bytes\"\n"
    - name: Upload express-api-hardening SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: express-api-hardening-results.sarif
        category: express-api-hardening
